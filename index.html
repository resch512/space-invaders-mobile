<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Space Invaders Mobile</title>
  <style>
    :root {
      --bg: #04070f;
      --hud: #a7ffeb;
      --accent: #7df9ff;
    }
    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at 50% 20%, #0d1a33 0%, #04070f 60%);
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #wrap {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
    }
    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      image-rendering: pixelated;
      touch-action: none;
    }
    #hint {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #dff;
      font-size: 14px;
      opacity: .8;
      background: rgba(0,0,0,.35);
      padding: 6px 10px;
      border-radius: 999px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="wrap"><canvas id="game"></canvas></div>
  <div id="hint">Touch & drag left/right to move</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    let W = 0, H = 0;
    function resize() {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      W = Math.floor(window.innerWidth * dpr);
      H = Math.floor(window.innerHeight * dpr);
      canvas.width = W;
      canvas.height = H;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Audio ---
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audio = null;
    function ensureAudio() {
      if (!audio) audio = new AudioCtx();
      if (audio.state === 'suspended') audio.resume();
    }

    function beep({freq=440, dur=0.08, type='square', vol=0.03, slide=0}) {
      if (!audio) return;
      const t0 = audio.currentTime;
      const osc = audio.createOscillator();
      const gain = audio.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t0);
      if (slide !== 0) osc.frequency.linearRampToValueAtTime(freq + slide, t0 + dur);
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(vol, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(gain).connect(audio.destination);
      osc.start(t0);
      osc.stop(t0 + dur + 0.02);
    }

    function laserSound() {
      beep({freq: 1300, dur: 0.08, type: 'sawtooth', vol: 0.04, slide: -550});
      beep({freq: 900, dur: 0.05, type: 'triangle', vol: 0.025, slide: -200});
    }

    function alienStepSound() {
      beep({freq: 180, dur: 0.06, type: 'square', vol: 0.03, slide: 30});
    }

    function hitSound() {
      beep({freq: 220, dur: 0.18, type: 'sawtooth', vol: 0.05, slide: -120});
    }

    function explosionSound() {
      beep({freq: 520, dur: 0.06, type: 'square', vol: 0.07, slide: -200});
      beep({freq: 260, dur: 0.16, type: 'sawtooth', vol: 0.06, slide: -180});
      beep({freq: 120, dur: 0.22, type: 'triangle', vol: 0.045, slide: -80});
    }

    function ufoSound() {
      beep({freq: 820, dur: 0.14, type: 'sine', vol: 0.045, slide: 20});
      beep({freq: 740, dur: 0.14, type: 'sine', vol: 0.04, slide: -20});
    }

    // --- Game state ---
    const ship = {
      w: 58, h: 26,
      x: 0, y: 0,
      speed: 0.24,
      cooldown: 300,
      lastShot: 0,
      lives: 3
    };

    const playerBullets = [];
    const alienBullets = [];
    const aliens = [];
    const explosions = [];

    const ufo = {
      active: false,
      x: 0,
      y: 48,
      w: 54,
      h: 20,
      vx: 0.36,
      dir: 1,
      nextSpawn: 0
    };

    let score = 0;
    let gameOver = false;
    let won = false;

    const formation = {
      rows: 5,
      cols: 8,
      spacingX: 16,
      spacingY: 14,
      alienW: 34,
      alienH: 24,
      startY: 100,
      dir: 1,
      stepX: 18,
      stepDown: 24,
      basePace: 650,
      pace: 650,
      lastStep: 0,
      frame: 0,
      totalAliens: 0
    };

    function createExplosion(x, y, size = 1) {
      explosions.push({
        x,
        y,
        r: 10 * size,
        life: 360,
        maxLife: 360,
        sparks: Array.from({length: 8}, () => ({
          angle: Math.random() * Math.PI * 2,
          speed: (0.08 + Math.random() * 0.18) * size,
          size: 2 + Math.random() * 3
        }))
      });
    }

    function updateFormationPace() {
      const alive = aliens.filter(a => a.alive).length;
      const killed = formation.totalAliens - alive;
      const progress = formation.totalAliens > 1 ? killed / (formation.totalAliens - 1) : 1;
      const speedFactor = 1 + progress * 9; // ends around 10x speed
      formation.pace = Math.max(65, formation.basePace / speedFactor);
    }

    function initAliens() {
      aliens.length = 0;
      const totalWidth = formation.cols * formation.alienW + (formation.cols - 1) * formation.spacingX;
      const startX = (W - totalWidth) / 2;
      for (let r = 0; r < formation.rows; r++) {
        for (let c = 0; c < formation.cols; c++) {
          aliens.push({
            x: startX + c * (formation.alienW + formation.spacingX),
            y: formation.startY + r * (formation.alienH + formation.spacingY),
            w: formation.alienW,
            h: formation.alienH,
            alive: true,
            row: r
          });
        }
      }
      formation.totalAliens = aliens.length;
      updateFormationPace();
    }

    function reset() {
      score = 0;
      ship.lives = 3;
      gameOver = false;
      won = false;
      playerBullets.length = 0;
      alienBullets.length = 0;
      explosions.length = 0;
      formation.dir = 1;
      formation.lastStep = 0;
      formation.frame = 0;
      formation.pace = formation.basePace;
      ship.x = W / 2 - ship.w / 2;
      ship.y = H - Math.max(170, Math.floor(H * 0.24)); // moved up: smaller play area
      ufo.active = false;
      ufo.nextSpawn = performance.now() + 5000 + Math.random() * 9000;
      initAliens();
    }

    // --- Input ---
    let dragging = false;
    let dragOffset = 0;

    function onDown(clientX) {
      ensureAudio();
      dragging = true;
      dragOffset = clientX * (canvas.width / window.innerWidth) - ship.x - ship.w / 2;
      document.getElementById('hint').style.display = 'none';
    }
    function onMove(clientX) {
      if (!dragging) return;
      const x = clientX * (canvas.width / window.innerWidth) - dragOffset;
      ship.x = Math.max(8, Math.min(W - ship.w - 8, x - ship.w / 2));
    }
    function onUp() { dragging = false; }

    canvas.addEventListener('touchstart', e => { if (e.touches[0]) onDown(e.touches[0].clientX); }, {passive:false});
    canvas.addEventListener('touchmove', e => { if (e.touches[0]) onMove(e.touches[0].clientX); e.preventDefault(); }, {passive:false});
    canvas.addEventListener('touchend', onUp);
    canvas.addEventListener('mousedown', e => onDown(e.clientX));
    window.addEventListener('mousemove', e => onMove(e.clientX));
    window.addEventListener('mouseup', onUp);

    // --- Utility ---
    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function drawShip() {
      const x = ship.x, y = ship.y;
      ctx.fillStyle = '#7df9ff';
      ctx.fillRect(x + ship.w * 0.45, y, ship.w * 0.1, ship.h * 0.55);
      ctx.fillRect(x + ship.w * 0.2, y + ship.h * 0.45, ship.w * 0.6, ship.h * 0.45);
      ctx.fillRect(x + ship.w * 0.05, y + ship.h * 0.72, ship.w * 0.2, ship.h * 0.2);
      ctx.fillRect(x + ship.w * 0.75, y + ship.h * 0.72, ship.w * 0.2, ship.h * 0.2);
    }

    function drawAlien(a) {
      ctx.fillStyle = a.row % 2 ? '#8bff8b' : '#ffdd77';
      const f = formation.frame;
      // Simple 2-frame animation (arms/legs alternate)
      ctx.fillRect(a.x + 6, a.y + 4, a.w - 12, a.h - 10);
      ctx.fillRect(a.x + 2, a.y + 9, 4, 6);
      ctx.fillRect(a.x + a.w - 6, a.y + 9, 4, 6);
      ctx.fillRect(a.x + 10, a.y + a.h - 8, 4, 6);
      ctx.fillRect(a.x + a.w - 14, a.y + a.h - 8, 4, 6);
      ctx.fillStyle = '#152';
      if (f === 0) {
        ctx.fillRect(a.x + 11, a.y + 10, 4, 4);
        ctx.fillRect(a.x + a.w - 15, a.y + 10, 4, 4);
      } else {
        ctx.fillRect(a.x + 9, a.y + 10, 4, 4);
        ctx.fillRect(a.x + a.w - 13, a.y + 10, 4, 4);
      }
    }

    function drawUfo() {
      if (!ufo.active) return;
      const x = ufo.x, y = ufo.y;
      ctx.fillStyle = '#ff6f91';
      ctx.fillRect(x + 8, y + 6, ufo.w - 16, 8);
      ctx.fillRect(x + 14, y + 2, ufo.w - 28, 6);
      ctx.fillRect(x + 4, y + 12, ufo.w - 8, 4);
      ctx.fillStyle = '#ffd166';
      ctx.fillRect(x + 12, y + 8, 4, 3);
      ctx.fillRect(x + ufo.w - 16, y + 8, 4, 3);
    }

    function drawExplosions(dt) {
      for (let i = explosions.length - 1; i >= 0; i--) {
        const e = explosions[i];
        e.life -= dt;
        if (e.life <= 0) {
          explosions.splice(i, 1);
          continue;
        }

        const p = e.life / e.maxLife;
        const alpha = Math.max(0, p);
        const radius = e.r * (1.4 - p);

        ctx.globalAlpha = alpha * 0.9;
        ctx.fillStyle = '#ff9f1c';
        ctx.beginPath();
        ctx.arc(e.x, e.y, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#ffe66d';
        ctx.beginPath();
        ctx.arc(e.x, e.y, radius * 0.55, 0, Math.PI * 2);
        ctx.fill();

        for (const s of e.sparks) {
          const traveled = (1 - p) * 60;
          const sx = e.x + Math.cos(s.angle) * traveled * s.speed * 8;
          const sy = e.y + Math.sin(s.angle) * traveled * s.speed * 8;
          ctx.fillStyle = '#fff';
          ctx.fillRect(sx, sy, s.size * p, s.size * p);
        }
      }
      ctx.globalAlpha = 1;
    }

    function shootPlayer(t) {
      if (t - ship.lastShot < ship.cooldown || gameOver) return;
      ship.lastShot = t;
      playerBullets.push({x: ship.x + ship.w / 2 - 2, y: ship.y - 10, w: 4, h: 12, vy: -0.9});
      laserSound();
    }

    function alienShootRandom() {
      if (gameOver) return;
      // ~1.8% chance per frame @60fps ≈ occasional shots
      if (Math.random() > 0.018) return;
      const alive = aliens.filter(a => a.alive);
      if (!alive.length) return;
      // pick one from lower half a bit more often
      alive.sort((a,b)=> b.y-a.y);
      const shooter = alive[Math.floor(Math.random() * Math.min(alive.length, 10))];
      alienBullets.push({x: shooter.x + shooter.w / 2 - 2, y: shooter.y + shooter.h + 2, w: 4, h: 12, vy: 0.5});
    }

    function maybeSpawnUfo(t) {
      if (gameOver || ufo.active) return;
      if (t < ufo.nextSpawn) return;
      ufo.active = true;
      ufo.dir = Math.random() < 0.5 ? 1 : -1;
      ufo.x = ufo.dir > 0 ? -ufo.w - 10 : W + 10;
      ufo.y = Math.max(30, formation.startY - 48);
      ufo.nextSpawn = t + 9000 + Math.random() * 13000;
      ufoSound();
    }

    function moveUfo(dt) {
      if (!ufo.active || gameOver) return;
      ufo.x += ufo.vx * dt * ufo.dir;
      if (ufo.dir > 0 && ufo.x > W + 20) ufo.active = false;
      if (ufo.dir < 0 && ufo.x + ufo.w < -20) ufo.active = false;
    }

    function moveAliens(t) {
      if (t - formation.lastStep < formation.pace || gameOver) return;
      formation.lastStep = t;
      formation.frame = formation.frame ? 0 : 1;
      alienStepSound();

      let hitEdge = false;
      for (const a of aliens) {
        if (!a.alive) continue;
        const nextX = a.x + formation.dir * formation.stepX;
        if (nextX < 8 || nextX + a.w > W - 8) {
          hitEdge = true;
          break;
        }
      }

      if (hitEdge) {
        formation.dir *= -1;
        for (const a of aliens) if (a.alive) a.y += formation.stepDown;
      } else {
        for (const a of aliens) if (a.alive) a.x += formation.dir * formation.stepX;
      }
    }

    function loseLife() {
      ship.lives -= 1;
      hitSound();
      if (ship.lives <= 0) {
        gameOver = true;
      }
    }

    function update(dt, t) {
      shootPlayer(t); // automatic fire
      moveAliens(t);
      alienShootRandom();
      maybeSpawnUfo(t);
      moveUfo(dt);

      for (const b of playerBullets) b.y += b.vy * dt;
      for (const b of alienBullets) b.y += b.vy * dt;

      // Player bullets vs aliens
      for (const b of playerBullets) {
        if (b.dead) continue;
        for (const a of aliens) {
          if (!a.alive) continue;
          if (rectsOverlap(b, a)) {
            b.dead = true;
            a.alive = false;
            score += 10;
            createExplosion(a.x + a.w / 2, a.y + a.h / 2, 1);
            explosionSound();
            updateFormationPace();
            break;
          }
        }
      }

      // Player bullets vs UFO
      if (ufo.active) {
        const ufoRect = {x: ufo.x, y: ufo.y, w: ufo.w, h: ufo.h};
        for (const b of playerBullets) {
          if (!b.dead && rectsOverlap(b, ufoRect)) {
            b.dead = true;
            ufo.active = false;
            score += 100;
            createExplosion(ufo.x + ufo.w / 2, ufo.y + ufo.h / 2, 1.4);
            explosionSound();
            break;
          }
        }
      }

      // Alien bullets vs ship
      const shipRect = {x: ship.x, y: ship.y, w: ship.w, h: ship.h};
      for (const b of alienBullets) {
        if (!b.dead && rectsOverlap(b, shipRect)) {
          b.dead = true;
          loseLife();
        }
      }

      // Alien touching ship => lose life
      for (const a of aliens) {
        if (a.alive && rectsOverlap(a, shipRect)) {
          a.alive = false;
          createExplosion(a.x + a.w / 2, a.y + a.h / 2, 1);
          explosionSound();
          updateFormationPace();
          loseLife();
        }
      }

      // Cleanup
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i];
        if (b.dead || b.y + b.h < 0) playerBullets.splice(i, 1);
      }
      for (let i = alienBullets.length - 1; i >= 0; i--) {
        const b = alienBullets[i];
        if (b.dead || b.y > H + 20) alienBullets.splice(i, 1);
      }

      // Win condition
      if (!aliens.some(a => a.alive)) {
        won = true;
        gameOver = true;
      }
    }

    function drawStars() {
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 80; i++) {
        const x = (i * 97) % W;
        const y = (i * 53 + performance.now() * 0.02 * ((i % 3)+1)) % H;
        ctx.globalAlpha = 0.15 + (i % 5) * 0.05;
        ctx.fillRect(x, y, 2, 2);
      }
      ctx.globalAlpha = 1;
    }

    function render(dt) {
      ctx.clearRect(0, 0, W, H);
      drawStars();

      // HUD
      ctx.fillStyle = '#a7ffeb';
      ctx.font = `${Math.max(22, Math.floor(W * 0.025))}px system-ui`;
      ctx.fillText(`Score: ${score}`, 18, 36);
      ctx.fillText(`Lives: ${ship.lives}`, W - 140, 36);

      drawUfo();
      drawShip();

      ctx.fillStyle = '#7df9ff';
      for (const b of playerBullets) ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.fillStyle = '#ff8fab';
      for (const b of alienBullets) ctx.fillRect(b.x, b.y, b.w, b.h);

      for (const a of aliens) if (a.alive) drawAlien(a);
      drawExplosions(dt);

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = `${Math.max(34, Math.floor(W * 0.05))}px system-ui`;
        ctx.fillText(won ? 'You Win! 🚀' : 'Game Over', W / 2, H / 2 - 10);
        ctx.font = `${Math.max(20, Math.floor(W * 0.03))}px system-ui`;
        ctx.fillText('Tap to restart', W / 2, H / 2 + 34);
        ctx.textAlign = 'left';
      }
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min(33, now - last);
      last = now;
      update(dt, now);
      render(dt);
      requestAnimationFrame(loop);
    }

    canvas.addEventListener('click', () => {
      ensureAudio();
      if (gameOver) reset();
    });

    reset();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
